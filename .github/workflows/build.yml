name: Windows build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Windows executable
        shell: cmd
        run: scripts\build.cmd

      - name: Test focused-task context reader
        shell: powershell
        run: scripts\test-context-reader.ps1 -SkipLiveCheck

      - name: Package release archive
        shell: powershell
        run: scripts\package-release.ps1 -Version 1.0.1

      - name: Upload packaged application
        uses: actions/upload-artifact@v4
        with:
          name: CodexEcamMonitor-win-x64
          path: |
            release/CodexEcamMonitor-v1.0.1-win-x64.zip
            release/CodexEcamMonitor-v1.0.1-win-x64.zip.sha256
